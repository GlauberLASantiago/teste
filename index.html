<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste 3 - Supabase Resolvido</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #eef2f3; padding: 20px; display: flex; justify-content: center; }
        .app-box { background: white; padding: 20px; border-radius: 8px; width: 100%; max-width: 400px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        button:hover { background: #0056b3; }
        .frase-salva { margin-top: 15px; padding: 15px; background: #d4edda; color: #155724; border-radius: 4px; text-align: center; font-style: italic; }
        #log-tela { margin-top: 20px; background: #1e1e1e; color: #00ff00; padding: 15px; border-radius: 4px; font-family: monospace; font-size: 12px; height: 200px; overflow-y: auto; }
        .erro-log { color: #ff4c4c; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-box">
    <h2>Teste 3: Gravador de Frase</h2>
    
    <label>Escreva uma frase para salvar:</label>
    <input type="text" id="campo-frase" placeholder="Ex: Hoje o dia está bonito...">
    <button onclick="salvarFrase()">Gravar no Banco de Dados</button>

    <div id="area-frase" style="display: none;">
        <p style="margin-bottom: 5px;"><strong>Última frase salva no banco:</strong></p>
        <div id="frase-exibida" class="frase-salva">Carregando...</div>
    </div>

    <div id="log-tela">
        <strong>--- MONITORAMENTO INICIADO ---</strong><br>
    </div>
</div>

<script>
    function log(mensagem, isErro = false) {
        const tela = document.getElementById('log-tela');
        const linha = document.createElement('div');
        linha.textContent = "> " + mensagem;
        if (isErro) linha.className = 'erro-log';
        tela.appendChild(linha);
        tela.scrollTop = tela.scrollHeight;
    }

    log("Passo 1: Lendo o script...");

    const SUPABASE_URL = 'https://outafyuukzxqhqvnkjva.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91dGFmeXV1a3p4cWhxdm5ranZhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0OTI0NDgsImV4cCI6MjA5MTA2ODQ0OH0.N913EFYb6PYefFyn0kDYtx7L9jt-l3EBVA_G9l-eimM';

    // Usando um nome diferente para não conflitar com a biblioteca do Supabase
    let meuSupabase;

    try {
        log("Passo 2: Conectando ao Supabase...");
        meuSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        log("Passo 3: Conectado com sucesso!");
        carregarUltimaFrase();
    } catch (erro) {
        log("ERRO FATAL NA CONEXAO: " + erro.message, true);
    }

    async function salvarFrase() {
        const texto = document.getElementById('campo-frase').value;
        if (!texto) {
            log("Aviso: Campo vazio.");
            return alert("Digite uma frase!");
        }
        
        log("Enviando para o banco...");
        
        try {
            const { error } = await meuSupabase.from('TESTE2_frases').insert([{ texto: texto }]);
            if (error) {
                log("ERRO AO SALVAR: " + error.message, true);
            } else {
                log("Sucesso: Gravado!");
                document.getElementById('campo-frase').value = '';
                carregarUltimaFrase();
            }
        } catch (erro) {
            log("ERRO INESPERADO: " + erro.message, true);
        }
    }

    async function carregarUltimaFrase() {
        log("Buscando frases...");
        document.getElementById('area-frase').style.display = 'block';
        document.getElementById('frase-exibida').textContent = 'Buscando...';
        
        try {
            const { data, error } = await meuSupabase.from('TESTE2_frases').select('*').order('criado_em', { ascending: false }).limit(1);
            if (error) {
                log("ERRO AO BUSCAR: " + error.message, true);
            } else {
                if (data.length > 0) {
                    log("Sucesso: Frase carregada!");
                    document.getElementById('frase-exibida').textContent = '"' + data[0].texto + '"';
                } else {
                    log("Aviso: Tabela vazia.");
                    document.getElementById('frase-exibida').textContent = 'Nenhuma frase salva.';
                }
            }
        } catch (erro) {
            log("ERRO INESPERADO: " + erro.message, true);
        }
    }
</script>

</body>
</html>
